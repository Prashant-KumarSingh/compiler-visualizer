<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compiler Visualizer</title>

  <style>
    body {
      font-family: Consolas, monospace;
      background: #1e1e1e;
      color: #fff;
    }

    .container {
      width: 80%;
      margin: auto;
      margin-top: 30px;
    }

    textarea {
      width: 100%;
      height: 150px;
      padding: 10px;
      background: #252526;
      color: #fff;
      border: none;
    }

    button {
      margin-top: 10px;
      padding: 10px 20px;
      background: #007acc;
      color: white;
      border: none;
      cursor: pointer;
    }

    .section {
      margin-top: 20px;
      background: #252526;
      padding: 15px;
      border-radius: 5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      border: 1px solid #444;
      padding: 8px;
      text-align: left;
    }

    th {
      background: #333;
    }

    .keyword { color: #569cd6; }
    .identifier { color: #9cdcfe; }
    .number { color: #b5cea8; }
    .operator { color: #d4d4d4; }
    .delimiter { color: #dcdcaa; }
    .invalid { color: red; }
    .lex { color: #c586c0; }          
    .regex { color: #d16969; }        
    .preprocessor { color: #c586c0; } 
    .operator { color: #d4d4d4; }     
    .string { color: #ce9178; }       
    .header { color: #4ec9b0; }       
    .comment { color: #6a9955; } 

    pre {
      background: #111;
      padding: 10px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Compiler Visualizer</h1>

  <textarea id="code" placeholder="Enter C code..."></textarea>
  <button onclick="runCompiler()">Run</button>

  <!-- LEXEMES -->
  <div class="section">
    <h3>Lexemes</h3>
    <ul id="lexemeList"></ul>
  </div>

  <!-- TOKENS -->
  <div class="section">
    <h3>Tokens</h3>
    <table>
      <thead>
        <tr>
          <th>Lexeme</th>
          <th>Token Type</th>
        </tr>
      </thead>
      <tbody id="tokenTable"></tbody>
    </table>
  </div>

  <!-- OTHER OUTPUT -->
  <div class="section">
    <h3>Other Analysis</h3>
    <pre id="output"></pre>
  </div>

</div>

<script>
async function runCompiler() {
  const code = document.getElementById("code").value;

  try {
    const res = await fetch("/run", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ code })
    });

    if (!res.ok) {
      throw new Error("Server error");
    }

    const data = await res.json();

    parseOutput(data.output);

  } catch (err) {
    document.getElementById("output").textContent =
      "❌ Error: Server not responding or crashed.\n" + err.message;
  }
}

// 🔥 Parse backend output and display nicely
function parseOutput(output) {
  const lines = output.split("\n");

  const lexemeList = document.getElementById("lexemeList");
  const tokenTable = document.getElementById("tokenTable");
  const other = document.getElementById("output");

  // ✅ Reset UI properly
  lexemeList.innerHTML = "";
  tokenTable.innerHTML = "";
  other.textContent = "";

  let mode = "";

  lines.forEach(line => {
    line = line.trim();

    if (line === "=== LEXEMES ===") {
      mode = "lexeme";
      return;
    }

    if (line === "=== TOKENS ===") {
      mode = "token";
      return;
    }

    if (line.startsWith("===")) {
      mode = "other";
      other.textContent += line + "\n";
      return;
    }

    // -------- LEXEMES --------
    if (mode === "lexeme" && line !== "") {
      const li = document.createElement("li");
      li.textContent = line;
      lexemeList.appendChild(li);
    }

    // -------- TOKENS --------
    else if (mode === "token" && line !== "" && !line.includes("LEXEME") && !line.includes("---")) {
      
      // ✅ Split ONLY first word (lexeme) and rest (type)
      const firstSpace = line.indexOf(" ");
      if (firstSpace === -1) return;

      const lex = line.substring(0, firstSpace).trim();
      const type = line.substring(firstSpace).trim();

      const row = document.createElement("tr");

      row.innerHTML = `
        <td>${lex}</td>
        <td class="${type.toLowerCase()}">${type}</td>
      `;

      tokenTable.appendChild(row);
    }

    // -------- OTHER OUTPUT --------
    else if (mode === "other") {
      other.textContent += line + "\n";
    }
  });
}
</script>

</body>
</html>
